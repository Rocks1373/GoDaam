# Production HTTPS for godam.divadivya.cloud
# Install after: certbot certonly --webroot -w /var/www/certbot -d godam.divadivya.cloud ...
#   sudo cp deploy/nginx/godam.divadivya.cloud.ssl.conf /etc/nginx/sites-available/godam.divadivya.cloud
#   sudo nginx -t && sudo systemctl reload nginx
#
# GoDam 1.0 (Streamlit): Node proxies to 127.0.0.1:8501. On the VPS, Streamlit must be running with
#   --server.baseUrlPath=huawei-godam-app (see scripts/run-huawei-godam-streamlit.sh). Check:
#   ss -tlnp | grep 8501
# If the page stays on gray skeleton loaders, WebSocket/normal HTTP proxy headers are often wrong —
# use Connection $connection_upgrade below (not Connection "upgrade" on every request).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name godam.divadivya.cloud;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name godam.divadivya.cloud;

    ssl_certificate /etc/letsencrypt/live/godam.divadivya.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/godam.divadivya.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /opt/godaam/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    client_max_body_size 25m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Large binary — disable proxy buffering + long read so mobile downloads are not truncated/corrupted.
    location = /api/mobile-app/apk {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
    }

    location = /api/admin/mobile-app/apk {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
    }

    location = /LOGO.png {
        root /opt/godaam/frontend/dist;
        default_type image/png;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # pdfjs worker (Vite emits pdf.worker-*.mjs) — must be JavaScript MIME or dynamic import fails
    location ~ ^/assets/.*\.mjs$ {
        root /opt/godaam/frontend/dist;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # AI microservice (optional direct access; web/mobile normally use /api/ai/* on Node)
    location /ai/ {
        proxy_pass http://127.0.0.1:8020/ai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /templates {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # GoDam Streamlit behind warehouse login (Express proxies + WS)
    location /huawei-godam-app {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
