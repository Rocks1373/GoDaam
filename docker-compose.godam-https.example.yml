# -----------------------------------------------------------------------------
# OPTIONAL overlay: route https://godam.divadivya.cloud → GoDaam `web` via Traefik.
#
# Read deploy/godam-https-traefik.md first.
#
# IMPORTANT — ports:
#   Base docker-compose.yml maps web "80:80".
#   docker-compose.hostinger.yml overrides to "8080:80" when something else uses :80.
#
# When Traefik owns :80 and :443 on the host, you must NOT keep publishing web on
# 8080 for the same public hostname you want secured — pick one architecture:
#   A) Traefik on 80/443 + labels on `web` + shared Docker network (this file),
#      and remove/stop using the hostinger 8080 override for production.
#   B) Keep http://godam...:8080 only (no Traefik in path) — stays HTTP "Not Secure".
#
# Adjust: network name, Host(), certresolver name (must match Traefik static config).
# -----------------------------------------------------------------------------

services:
  web:
    networks:
      - default
      - traefik_edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_edge
      - traefik.http.routers.godam.rule=Host(`godam.divadivya.cloud`)
      - traefik.http.routers.godam.entrypoints=websecure
      - traefik.http.routers.godam.tls.certresolver=le
      - traefik.http.services.godam.loadbalancer.server.port=80

networks:
  traefik_edge:
    external: true
