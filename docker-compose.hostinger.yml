# Hostinger VPS: Traefik often binds host port 80/443.
#
# Set in `.env` on the server (do not commit `.env`):
#   WEB_HOST_PORT=8080
#
# Then deploy:
#   docker compose -f docker-compose.yml -f docker-compose.hostinger.yml up -d --build
#
# (This file is kept for docs/scripts; port mapping is driven by WEB_HOST_PORT in docker-compose.yml.)

services: {}
