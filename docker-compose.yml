# GoDaam — API + web behind nginx (same origin → browser keeps /api)
#
# On Hostinger VPS:
#   1. Install Docker + Compose plugin
#   2. Copy .env.example → .env and set JWT_SECRET (required), optional ADMIN_*, CORS_ORIGIN
#   3. docker compose up -d --build
#   4. Point DNS to VPS; put HTTPS in front (Caddy / host nginx / Cloudflare) → proxy to port 80
#
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3001"
      DB_PATH: /data/warehouse.db
    volumes:
      - godam_data:/data
      - godam_uploads:/app/uploads

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  godam_data:
  godam_uploads:
